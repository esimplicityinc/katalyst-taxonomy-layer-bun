apiVersion: katalyst.taxonomy.plugins.cicd/v1alpha
kind: JobTemplate
metadata:
  name: gha-app-bun-layer-ci
spec:
  description: CI stage job for App Bun layers in GitHub Actions.
  stage: ci
  layerType: app-bun
  template:
    path: templates/jobs/app-bun-layer.yml.j2
    renderer:
      type: jinja
      strictUndefined: true
  inputs:
    required:
      - system
      - sub_system
      - stack
      - environment
      - aws_role_arn
      - aws_region
    defaults:
      job_id: app_bun_layer_ci
      job_name: "🥟 App Bun Layer :: CI"
      workflow_path: "./.github/workflows/.template-app-bun-ci.yaml"
---
