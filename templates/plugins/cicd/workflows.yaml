      required: true
    environment:
      description: Target environment.
      type: string
      required: true
    aws_role_arn:
      description: AWS IAM role ARN for OIDC auth.
      type: string
      required: true
    aws_region:
      description: AWS region.
      type: string
      required: true
    health_url:
      description: URL to health-check after deploy.
      type: string
      required: false
    eks_cluster_arn:
      description: ARN of the EKS cluster for kubectl access.
      type: string
