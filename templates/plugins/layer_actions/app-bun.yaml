apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: app-bun-install
  labels:
    layerType: app-bun
spec:
  description: Install Bun dependencies.
  type: shell
  when: pre
  run: just app-bun-install
  timeoutSeconds: 120
  tags:
    - install
    - dependencies
    - bun
---
apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
kind: Action
metadata:
  name: app-bun-dev
  labels:
    layerType: app-bun
spec:
  description: Start the Bun development server with hot reload.
  type: shell
  when: main
  run: just app-bun-dev
  timeoutSeconds: 0
  tags:
    - dev
    - serve
    - bun
---
apiVersion: katalyst.taxonomy.plugins.actions/v1alpha
